<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Favicon Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load libraries for Zip and ICO support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/icojs/dist/ico.js"></script>
</head>
<body>
    <div class="container">
        <h1>Favicon Generator</h1>
        <p>Convert your logo to perfect browser icons.</p>
        
        <div id="drop-zone" class="drop-zone">
            <span>Drop image here or click to upload</span>
            <input type="file" id="upload" accept="image/*" hidden>
        </div>

        <div id="preview-grid" class="preview-grid"></div>
        <button id="downloadBtn" class="primary-btn" style="display:none;">Download All (.zip)</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
